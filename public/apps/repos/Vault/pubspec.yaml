name: vault
description: Secure local document vault with AES-256-GCM encryption.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  path_provider: ^2.1.4
  image_picker: ^1.1.3
  google_mlkit_text_recognition: ^0.13.1
  pdf: ^3.11.1
  pdfx: ^2.7.0
  image: ^4.2.0
  share_plus: ^10.1.2
  uuid: ^4.4.2
  json_annotation: ^4.9.0
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  open_filex: ^4.5.0
  google_mlkit_document_scanner: ^0.4.0
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
